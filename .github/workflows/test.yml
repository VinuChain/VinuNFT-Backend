name: Test

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  hardhat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: yarn install --frozen-lockfile
      - run: yarn compile
      - run: yarn test
